# AI Companion 本地运行配置
# 注意：此文件包含敏感信息，请勿提交到 Git（已在 .gitignore 中排除）

ollama:
  endpoint: "http://localhost:11434"  # WSL2 下自动检测 Windows 宿主 IP
  model: "auto"                 # auto=自动检测已安装模型

memory:
  persist_dir: "./chroma_db"
  top_k: 5

emotion:
  enable: true
  tag_format: "[{emotion}]"

personality:
  skill_file: ""  # 留空自动检测 data/processed/skill_*_cloud_safe.md

logging:
  level: "INFO"
  file: "bot.log"